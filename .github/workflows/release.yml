name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: true

env:
  PROJECT_PATH: src/FiveMDiagnostics.App.Wpf/FiveMDiagnostics.App.Wpf.csproj
  PROJECT_NAME: FiveMDiagnostics
  RUNTIME_ID: win-x64
  WINDOWS_CODESIGN_CERT_PFX_BASE64: ${{ secrets.WINDOWS_CODESIGN_CERT_PFX_BASE64 }}
  WINDOWS_CODESIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_CERT_PASSWORD }}

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Compute release metadata
        id: meta
        shell: pwsh
        run: |
          $version = "1.0.${{ github.run_number }}"
          $tagName = "v$version"
          $assemblyVersion = "1.0.${{ github.run_number }}.0"
          $releaseName = "FiveMDiagnostics $version"
          $assetName = "FiveMDiagnostics.exe"

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag_name=$tagName" >> $env:GITHUB_OUTPUT
          "assembly_version=$assemblyVersion" >> $env:GITHUB_OUTPUT
          "release_name=$releaseName" >> $env:GITHUB_OUTPUT
          "asset_name=$assetName" >> $env:GITHUB_OUTPUT

      - name: Restore dependencies
        shell: pwsh
        run: dotnet restore $env:PROJECT_PATH

      - name: Publish app
        shell: pwsh
        run: |
          $publishDir = Join-Path $PWD "artifacts/publish/$env:RUNTIME_ID"

          if (Test-Path $publishDir)
          {
            Remove-Item $publishDir -Recurse -Force
          }

          dotnet publish $env:PROJECT_PATH `
            -c Release `
            -r $env:RUNTIME_ID `
            --self-contained true `
            -p:ContinuousIntegrationBuild=true `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=false `
            -p:PublishReadyToRun=false `
            -p:Version=${{ steps.meta.outputs.version }} `
            -p:AssemblyVersion=${{ steps.meta.outputs.assembly_version }} `
            -p:FileVersion=${{ steps.meta.outputs.assembly_version }} `
            -p:InformationalVersion="${{ steps.meta.outputs.version }}+${{ github.sha }}" `
            -o $publishDir

          $publishedExeName = "$(Split-Path $env:PROJECT_PATH -LeafBase).exe"
          $publishedExePath = Join-Path $publishDir $publishedExeName
          $releaseExePath = Join-Path $publishDir "${{ steps.meta.outputs.asset_name }}"

          if (!(Test-Path $publishedExePath))
          {
            throw "Expected published executable not found at $publishedExePath"
          }

          if (Test-Path $releaseExePath)
          {
            Remove-Item $releaseExePath -Force
          }

          Move-Item $publishedExePath $releaseExePath

      - name: Code sign executable (optional)
        if: ${{ env.WINDOWS_CODESIGN_CERT_PFX_BASE64 != '' && env.WINDOWS_CODESIGN_CERT_PASSWORD != '' }}
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "fivemdiagnostics-codesign.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CODESIGN_CERT_PFX_BASE64))

          $exePath = Join-Path $PWD "artifacts/publish/$env:RUNTIME_ID/${{ steps.meta.outputs.asset_name }}"
          signtool sign `
            /fd SHA256 `
            /f $certPath `
            /p $env:WINDOWS_CODESIGN_CERT_PASSWORD `
            /tr "http://timestamp.digicert.com" `
            /td SHA256 `
            $exePath

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: fivemdiagnostics-${{ steps.meta.outputs.version }}-win-x64
          path: artifacts/publish/${{ env.RUNTIME_ID }}/${{ steps.meta.outputs.asset_name }}

      - name: Write release notes
        shell: pwsh
        run: |
          @"
          Automated release from the main branch.

          Tag: ${{ steps.meta.outputs.tag_name }}
          Build: ${{ steps.meta.outputs.version }}
          Commit: ${{ github.sha }}
          Runtime: ${{ env.RUNTIME_ID }}

          Download FiveMDiagnostics.exe from the release assets and run it directly.
          "@ | Set-Content -Path artifacts/release-notes.md

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.meta.outputs.tag_name }}
          commit: ${{ github.sha }}
          name: ${{ steps.meta.outputs.release_name }}
          bodyFile: artifacts/release-notes.md
          artifacts: artifacts/publish/${{ env.RUNTIME_ID }}/${{ steps.meta.outputs.asset_name }}
          allowUpdates: true
          artifactErrorsFailBuild: true
          replacesArtifacts: true
          makeLatest: true
